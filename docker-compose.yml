# Example docker-compose for OpenPosterDB.
#
# Copy this file and create a .env alongside it with the required values:
#
#   TMDB_API_KEY=<your key from https://www.themoviedb.org/settings/api>
#   JWT_SECRET=<64 hex chars — generate with: openssl rand -hex 32>
#
# At least one of OMDB_API_KEY or MDBLIST_API_KEY is also required for ratings:
#
#   OMDB_API_KEY=<your key from https://www.omdbapi.com/apikey.aspx>
#   MDBLIST_API_KEY=<your key from https://mdblist.com/preferences/>
#
# Then run:
#
#   docker compose up -d
#
# The web UI will be available at http://localhost:3000.
# On first visit you'll be prompted to create an admin account.
#
# Optional settings:
#
#   COOKIE_SECURE=false   — Set this if you access the UI over plain HTTP
#                           (e.g. localhost without a reverse proxy).
#                           Defaults to true, which requires HTTPS — the
#                           browser will silently ignore auth cookies
#                           without it.

services:
  openposterdb:
    build: .
    ports:
      - "3000:3000"
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY:?Set TMDB_API_KEY in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env — generate with: openssl rand -hex 32}
      OMDB_API_KEY: ${OMDB_API_KEY:-}
      MDBLIST_API_KEY: ${MDBLIST_API_KEY:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      LISTEN_ADDR: 0.0.0.0:3000
      CACHE_DIR: /data/cache
      STATIC_DIR: /app/dist
    volumes:
      - openposterdb-data:/data
    restart: unless-stopped

volumes:
  openposterdb-data:
